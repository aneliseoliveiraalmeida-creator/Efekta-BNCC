<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta BNCC × Efekta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f0a500;
    --accent2: #3d8bcd;
    --green: #3fb950;
    --cefr-a1: #6366f1; --cefr-a2: #8b5cf6;
    --cefr-b1: #0ea5e9; --cefr-b1p: #06b6d4;
    --cefr-b2: #10b981; --cefr-c1: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0f1e2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo-block p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge {
    background: rgba(240,165,0,0.12);
    border: 1px solid rgba(240,165,0,0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* CONTROLS */
  .controls {
    max-width: 1200px;
    margin: 28px auto 0;
    padding: 0 40px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ctrl-group label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }

  select, input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,165,0,0.15);
  }
  select { min-width: 150px; }
  input[type="text"] { min-width: 280px; }

  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  /* RESULTS INFO */
  .results-bar {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .results-count {
    font-size: 0.82rem;
    color: var(--muted);
  }
  .results-count span { color: var(--accent); font-weight: 600; }

  /* CARDS GRID */
  .grid {
    max-width: 1200px;
    margin: 20px auto 60px;
    padding: 0 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .skill-card:hover {
    transform: translateY(-2px);
    border-color: rgba(240,165,0,0.4);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .skill-card.expanded {
    border-color: var(--accent);
    grid-column: span 2;
  }

  .card-header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-code {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.45;
    font-weight: 400;
  }
  .card-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .tag-ano { background: rgba(61,139,205,0.15); color: #5badde; border: 1px solid rgba(61,139,205,0.25); }
  .tag-cefr-A1 { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
  .tag-cefr-A2 { background: rgba(139,92,246,0.15); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
  .tag-cefr-B1 { background: rgba(14,165,233,0.15); color: #7dd3fc; border: 1px solid rgba(14,165,233,0.3); }
  .tag-cefr-B1p { background: rgba(6,182,212,0.15); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
  .tag-cefr-B2 { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .tag-cefr-C1 { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }

  /* LEVELS accordion */
  .card-levels {
    display: none;
  }
  .skill-card.expanded .card-levels { display: block; }
  .level-row {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 80px 70px 1fr;
    gap: 12px;
    align-items: start;
    transition: background 0.1s;
  }
  .level-row:last-child { border-bottom: none; }
  .level-row:hover { background: var(--surface2); }
  .cefr-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 22px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .cefr-A1 { background: rgba(99,102,241,0.2); color: #a5b4fc; }
  .cefr-A2 { background: rgba(139,92,246,0.2); color: #c4b5fd; }
  .cefr-B1 { background: rgba(14,165,233,0.2); color: #7dd3fc; }
  .cefr-B1p { background: rgba(6,182,212,0.2); color: #67e8f9; }
  .cefr-B2 { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .cefr-C1 { background: rgba(245,158,11,0.2); color: #fcd34d; }

  .efekta-level {
    font-size: 0.75rem;
    color: var(--muted);
    padding-top: 2px;
    font-weight: 500;
  }
  .level-activities {
    font-size: 0.78rem;
    color: #cdd9e5;
    line-height: 1.5;
  }
  .level-activities ul {
    padding-left: 14px;
    list-style: disc;
  }
  .level-activities li { margin-bottom: 2px; }

  /* expand toggle */
  .expand-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    font-size: 0.78rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
  }
  .expand-btn:hover { color: var(--accent); }
  .expand-btn .arrow { transition: transform 0.2s; font-size: 0.65rem; }
  .skill-card.expanded .expand-btn .arrow { transform: rotate(180deg); }
  .skill-card.expanded .expand-btn { color: var(--accent); }

  /* empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .empty p { font-size: 0.85rem; }

  /* HIGHLIGHT */
  mark {
    background: rgba(240,165,0,0.3);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* CEFR Legend */
  .legend {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend span {
    font-size: 0.7rem;
    color: var(--muted);
    margin-right: 4px;
  }

  @media (max-width: 700px) {
    header { padding: 18px 16px; }
    .controls, .results-bar, .grid, .legend { padding: 0 16px; }
    .grid { grid-template-columns: 1fr; }
    .skill-card.expanded { grid-column: span 1; }
    .level-row { grid-template-columns: 1fr; }
    input[type="text"] { min-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-block">
      <h1>BNCC × Efekta</h1>
      <p>Consulta de Habilidades por Nível</p>
    </div>
    <span class="badge">Inglês — 6º ao EM</span>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Série / Segmento</label>
    <select id="filterAno">
      <option value="">Todos</option>
      <option value="6º Ano">6º Ano</option>
      <option value="7º Ano">7º Ano</option>
      <option value="8º Ano">8º Ano</option>
      <option value="9º Ano">9º Ano</option>
      <option value="Ensino Médio">Ensino Médio</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Nível CEFR</label>
    <select id="filterCEFR">
      <option value="">Todos</option>
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B1+">B1+</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Nível Efekta</label>
    <select id="filterEfekta">
      <option value="">Todos</option>
      <option value="1-3">1–3</option>
      <option value="4-6">4–6</option>
      <option value="7-9">7–9</option>
      <option value="10-12">10–12</option>
      <option value="13-14">13–14</option>
      <option value="15-16">15–16</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Buscar habilidade ou código</label>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Ex: EF06LI01, oral, futuro..." />
    </div>
  </div>
  <button class="btn-clear" onclick="clearFilters()">Limpar</button>
</div>

<div class="legend">
  <span>CEFR:</span>
  <span class="tag tag-cefr-A1">A1</span>
  <span class="tag tag-cefr-A2">A2</span>
  <span class="tag tag-cefr-B1">B1</span>
  <span class="tag tag-cefr-B1p">B1+</span>
  <span class="tag tag-cefr-B2">B2</span>
  <span class="tag tag-cefr-C1">C1</span>
</div>

<div class="results-bar">
  <p class="results-count">Exibindo <span id="countDisplay">0</span> habilidades</p>
</div>

<div class="grid" id="grid"></div>

<script>

// ─── RENDER ──────────────────────────────────────────────────────────────────
function cefrClass(cefr) {
  return cefr.replace('+','p');
}

function highlightText(text, term) {
  if (!term) return text;
  const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function filterData() {
  const ano = document.getElementById('filterAno').value;
  const cefr = document.getElementById('filterCEFR').value;
  const efekta = document.getElementById('filterEfekta').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  return DATA.filter(skill => {
    if (ano && skill.ano !== ano) return false;
    if (search) {
      const inCode = skill.code.toLowerCase().includes(search);
      const inTitle = skill.title.toLowerCase().includes(search);
      const inActivities = skill.levels.some(l =>
        l.activities.some(a => a.toLowerCase().includes(search))
      );
      if (!inCode && !inTitle && !inActivities) return false;
    }
    if (cefr || efekta) {
      const hasLevel = skill.levels.some(l => {
        if (cefr && l.cefr !== cefr) return false;
        if (efekta && l.efekta !== efekta) return false;
        return true;
      });
      if (!hasLevel) return false;
    }
    return true;
  });
}

function renderCards() {
  const grid = document.getElementById('grid');
  const cefr = document.getElementById('filterCEFR').value;
  const efekta = document.getElementById('filterEfekta').value;
  const search = document.getElementById('searchInput').value.trim();
  const results = filterData();

  document.getElementById('countDisplay').textContent = results.length;

  if (results.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">🔍</div><h3>Nenhuma habilidade encontrada</h3><p>Tente outros filtros ou termos de busca</p></div>`;
    return;
  }

  grid.innerHTML = results.map(skill => {
    // Get levels to show based on filters
    let levelsToShow = skill.levels;
    if (cefr) levelsToShow = levelsToShow.filter(l => l.cefr === cefr);
    if (efekta) levelsToShow = levelsToShow.filter(l => l.efekta === efekta);
    // Show all unique CEFRs in meta
    const allCEFRs = [...new Set(skill.levels.map(l=>l.cefr))];

    const titleHl = highlightText(skill.title, search);
    const codeHl = highlightText(skill.code, search);

    const levelsHtml = levelsToShow.map(l => {
      const activitiesHtml = l.activities.map(a => `<li>${highlightText(a, search)}</li>`).join('');
      return `<div class="level-row">
        <span class="cefr-badge cefr-${cefrClass(l.cefr)}">${l.cefr}</span>
        <span class="efekta-level">Efekta ${l.efekta}</span>
        <div class="level-activities"><ul>${activitiesHtml}</ul></div>
      </div>`;
    }).join('');

    const cefrTags = allCEFRs.map(c => `<span class="tag tag-cefr-${cefrClass(c)}">${c}</span>`).join('');

    return `<div class="skill-card" id="card-${skill.code}">
      <div class="card-header" onclick="toggleCard('${skill.code}')">
        <div class="card-code">${codeHl}</div>
        <div class="card-title">${titleHl}</div>
        <div class="card-meta">
          <span class="tag tag-ano">${skill.ano}</span>
          ${cefrTags}
        </div>
      </div>
      <div class="card-levels">${levelsHtml}</div>
      <button class="expand-btn" onclick="toggleCard('${skill.code}')">
        <span>Ver como é trabalhado por nível</span>
        <span class="arrow">▼</span>
      </button>
    </div>`;
  }).join('');
}

function toggleCard(code) {
  const card = document.getElementById('card-'+code);
  card.classList.toggle('expanded');
}

function clearFilters() {
  document.getElementById('filterAno').value = '';
  document.getElementById('filterCEFR').value = '';
  document.getElementById('filterEfekta').value = '';
  document.getElementById('searchInput').value = '';
  renderCards();
}

// Events
['filterAno','filterCEFR','filterEfekta'].forEach(id =>
  document.getElementById(id).addEventListener('change', renderCards)
);
document.getElementById('searchInput').addEventListener('input', renderCards);

// Initial render
renderCards();
</script>
